common_requirements: |
  Cohesive editorial photography style for the Aurora Coffee brand:
  warm morning light, shallow depth of field, muted earth-tone palette,
  hand-made ceramics, slight steam, no text or logos in frame.
  Photorealistic, high resolution, magazine-quality.
variations_description: |
  Vary the camera angle, time of day within the morning hours,
  and secondary props while preserving the warm editorial mood.
variations_count: 2
instances_per_prompt: 1
size: "1024x1024"
images:
  - name: morning-ritual
    size: "1536x1024"
    description: |
      A close-up of a hand-thrown ceramic mug of black coffee on a worn
      wooden table by a sunlit kitchen window. Steam rises gently. A
      paperback book is open beside the mug. The mood is unhurried,
      private, intimate.
  - name: brand-texture
    description: |
      A top-down flat lay of raw coffee beans scattered on a linen
      cloth next to a hand-made ceramic pour-over dripper. Warm side
      light from a window. The palette is brown, cream, and charcoal.
  - name: pour-over-detail
    size: "1536x1024"
    description: |
      Extreme close-up of hot water being poured from a gooseneck
      kettle into a ceramic pour-over filter. The stream of water is
      in sharp focus; everything else is a warm bokeh. Steam curls
      upward. Cinematic, slow-motion feel.
  - name: roastery-moments
    size: "1536x1024"
    description: |
      A candid wide shot inside a small-batch coffee roastery. A
      person in an apron checks a drum roaster. Burlap sacks of green
      beans are stacked behind. Natural window light, industrial-warm
      mood. No faces clearly visible.
  - name: latte-art
    description: |
      Top-down close-up of a latte in a white ceramic cup showing
      intricate rosetta latte art. The foam pattern is sharp and
      detailed. The cup sits on a dark wooden counter with soft
      morning light from the side.
  - name: bean-comparison
    description: |
      Two small piles of coffee beans on a marble surface — one
      dark-roasted single-origin on the left, one lighter blend on
      the right. Each pile has a tiny handwritten paper tag. Warm
      side light, shallow depth of field, editorial food photography.