common_requirements: |
  Aurora Coffee editorial photography. Warm natural light, tactile ceramic
  surfaces, shallow depth of field, realistic steam, premium but human mood.
  Photorealistic, magazine-quality, color-accurate. Do not invent extra text.

variations_description: |
  Explore distinct settings, camera distances, and prop combinations while
  keeping the Aurora identity coherent. When an input logo is provided, keep it
  recognizable and cleanly integrated rather than stylized beyond recognition.

variations_count: 8
instances_per_prompt: 1
parallelism: 24
parallelism_per_model: 12
size: "2048x2048"
quality: high
output_dir: ./output

models:
  - gpt-image-2

images:
  - name: signature-mug
    input_image: ./aurora-logo.jpg
    description: |
      A hero product shot of a matte-black ceramic coffee mug in a cozy cafe.
      The provided Aurora logo is printed cleanly on the front of the mug. Warm
      morning light from the side, subtle steam, wooden table, premium but
      natural atmosphere.
  - name: cafe-hero
    size: "3840x2160"
    description: |
      Wide 16:9 hero scene inside a small independent coffee shop. A barista
      works behind the counter while the Aurora mug sits prominently in the
      foreground near a pastry and a glass of sparkling water. Inviting, warm,
      cinematic, presentation-ready.
